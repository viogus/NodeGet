name: nodeget-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.3.7. Leave empty for artifact-only manual builds."
        required: false
        type: string
      publish_release:
        description: "Create/update the GitHub Release and Docker image. Requires release_tag."
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref_name || inputs.release_tag || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve release mode
        id: release
        shell: bash
        run: |
          publish="false"
          tag=""

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            publish="true"
            tag="${GITHUB_REF_NAME}"
          else
            publish="${{ inputs.publish_release }}"
            tag="${{ inputs.release_tag }}"
          fi

          if [[ "${publish}" == "true" ]]; then
            if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "release_tag must look like v0.3.7 when publishing" >&2
              exit 1
            fi
          fi

          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build-linux:
    name: Linux ${{ matrix.platform.release_for }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - release_for: x86_64-musl
            target: x86_64-unknown-linux-musl
            suffix: linux-x86_64-musl
          - release_for: x86_64-gnu
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64-gnu
          - release_for: aarch64-musl
            target: aarch64-unknown-linux-musl
            suffix: linux-aarch64-musl
          - release_for: aarch64-gnu
            target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-shared-key: release-linux-${{ matrix.platform.target }}

      - name: Install cross
        env:
          CROSS_VERSION: v0.2.5
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "${HOME}/.local/bin"
          gh release download "${CROSS_VERSION}" \
            --repo cross-rs/cross \
            --pattern cross-x86_64-unknown-linux-gnu.tar.gz \
            -O - \
            | tar -xz -C "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Build binaries
        run: |
          cross build --package nodeget-agent --target "${{ matrix.platform.target }}" --profile minimal --locked
          cross build --package nodeget-server --target "${{ matrix.platform.target }}" --profile minimal --locked

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.platform.target }}/minimal/nodeget-agent" "dist/nodeget-agent-${{ matrix.platform.suffix }}"
          cp "target/${{ matrix.platform.target }}/minimal/nodeget-server" "dist/nodeget-server-${{ matrix.platform.suffix }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.platform.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Windows x86_64
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: x86_64-pc-windows-msvc
          cache-shared-key: release-windows-x86_64-pc-windows-msvc

      - name: Build binaries
        run: |
          cargo build --package nodeget-agent --target x86_64-pc-windows-msvc --profile minimal --locked
          cargo build --package nodeget-server --target x86_64-pc-windows-msvc --profile minimal --locked

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\x86_64-pc-windows-msvc\minimal\nodeget-agent.exe dist\nodeget-agent-windows-x86_64.exe
          Copy-Item target\x86_64-pc-windows-msvc\minimal\nodeget-server.exe dist\nodeget-server-windows-x86_64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86_64-pc-windows-msvc
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: macOS aarch64
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: aarch64-apple-darwin
          cache-shared-key: release-macos-aarch64-apple-darwin

      - name: Build binaries
        run: |
          cargo build --package nodeget-agent --target aarch64-apple-darwin --profile minimal --locked
          cargo build --package nodeget-server --target aarch64-apple-darwin --profile minimal --locked

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/minimal/nodeget-agent dist/nodeget-agent-macos-aarch64
          cp target/aarch64-apple-darwin/minimal/nodeget-server dist/nodeget-server-macos-aarch64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-aarch64-apple-darwin
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build-linux
      - build-windows
      - build-macos
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: NodeGet ${{ needs.prepare.outputs.tag }}
          make_latest: true
          files: dist/*

  publish-docker:
    name: Publish Docker image
    needs:
      - prepare
      - publish-release
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write
    env:
      REGISTRY: docker.io
      IMAGE_NAME: genshinmc/nodeget
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Docker Hub credentials
        shell: bash
        run: |
          test -n "${DOCKERHUB_USERNAME}"
          test -n "${DOCKERHUB_TOKEN}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime-release
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NODEGET_VERSION=${{ needs.prepare.outputs.tag }}
            NODEGET_RELEASE_REPO=${{ github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
