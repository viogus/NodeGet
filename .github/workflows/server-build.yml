name: nodeget-server-build

on:
  workflow_dispatch:
  merge_group:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "docs/**"
      - "README.md"

jobs:
  server-release:
    name: Build - ${{ matrix.platform.release_for }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - release_for: linux_x86_64_musl
            target: x86_64-unknown-linux-musl
            binary_name: nodeget-server-linux-x86_64-musl
          - release_for: linux_x86_64_gnu
            target: x86_64-unknown-linux-gnu
            binary_name: nodeget-server-linux-x86_64-gnu
          - release_for: linux_arm_gnueabi
            target: arm-unknown-linux-gnueabi
            binary_name: nodeget-server-linux-arm-gnueabi
          - release_for: linux_arm_gnueabihf
            target: arm-unknown-linux-gnueabihf
            binary_name: nodeget-server-linux-arm-gnueabihf
          - release_for: linux_aarch64_gnu
            target: aarch64-unknown-linux-gnu
            binary_name: nodeget-server-linux-aarch64-gnu
          - release_for: linux_aarch64_musl
            target: aarch64-unknown-linux-musl
            binary_name: nodeget-server-linux-aarch64-musl
          - release_for: linux_armv7_gnueabi
            target: armv7-unknown-linux-gnueabi
            binary_name: nodeget-server-linux-armv7-gnueabi
          - release_for: linux_armv7_gnueabihf
            target: armv7-unknown-linux-gnueabihf
            binary_name: nodeget-server-linux-armv7-gnueabihf
          - release_for: linux_armv7_musleabi
            target: armv7-unknown-linux-musleabi
            binary_name: nodeget-server-linux-armv7-musleabi
          - release_for: linux_armv7_musleabihf
            target: armv7-unknown-linux-musleabihf
            binary_name: nodeget-server-linux-armv7-musleabihf

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-system
        with:
          toolchain: stable
          components: clippy

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        working-directory: ./server
        run: cargo clean && cross build --target ${{ matrix.platform.target }} --profile minimal --jobs 32
        env:
          CROSS_NO_WARNINGS: 0

      - name: Compress binary
        run: upx --brute ./target/${{ matrix.platform.target }}/minimal/nodeget-server

      - name: Rename binary
        run: cp target/${{ matrix.platform.target }}/minimal/nodeget-server target/${{ matrix.platform.target }}/minimal/${{ matrix.platform.binary_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.platform.target }}
          path: target/${{ matrix.platform.target }}/minimal/${{ matrix.platform.binary_name }}
          if-no-files-found: error

  release-dev:
    name: Release Dev
    needs: [ server-release, server-windows, server-macos ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: artifacts
          merge-multiple: true

      - name: Upload to dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Dev Build (Latest)"
          prerelease: true
          make_latest: false
          body: "Automated dev build from `${{ github.sha }}`"
          files: artifacts/*

  release-main:
    name: Release Main
    needs: [ server-release, server-windows, server-macos ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from nodeget-lib
        id: version
        run: |
          VERSION=$(grep '^version' nodeget-lib/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "NodeGet ${{ steps.version.outputs.tag }}"
          make_latest: true
          files: artifacts/*

  server-windows:
    name: Build - ${{ matrix.platform.release_for }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - release_for: windows_x86_64
            target: x86_64-pc-windows-msvc
            binary_name: nodeget-server-windows-x86_64.exe
          - release_for: windows_aarch64
            target: aarch64-pc-windows-msvc
            binary_name: nodeget-server-windows-aarch64.exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.platform.target }}

      - name: Build binary
        working-directory: ./server
        run: cargo build --target ${{ matrix.platform.target }} --profile minimal

      - name: Rename binary
        run: copy target\${{ matrix.platform.target }}\minimal\nodeget-server.exe target\${{ matrix.platform.target }}\minimal\${{ matrix.platform.binary_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.platform.target }}
          path: target/${{ matrix.platform.target }}/minimal/${{ matrix.platform.binary_name }}
          if-no-files-found: error

  server-macos:
    name: Build - ${{ matrix.platform.release_for }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - release_for: macos_aarch64
            target: aarch64-apple-darwin
            binary_name: nodeget-server-macos-aarch64
            runner: macos-latest
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.platform.target }}

      - name: Build binary
        working-directory: ./server
        run: cargo build --target ${{ matrix.platform.target }} --profile minimal

      - name: Rename binary
        run: cp target/${{ matrix.platform.target }}/minimal/nodeget-server target/${{ matrix.platform.target }}/minimal/${{ matrix.platform.binary_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.platform.target }}
          path: target/${{ matrix.platform.target }}/minimal/${{ matrix.platform.binary_name }}
          if-no-files-found: error