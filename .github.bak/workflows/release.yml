name: nodeget-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.3.7. Leave empty for artifact-only manual builds."
        required: false
        type: string
      publish_release:
        description: "Create/update the GitHub Release and Docker image. Requires release_tag."
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref_name || inputs.release_tag || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve release mode
        id: release
        shell: bash
        run: |
          publish="false"
          tag=""

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            publish="true"
            tag="${GITHUB_REF_NAME}"
          else
            publish="${{ inputs.publish_release }}"
            tag="${{ inputs.release_tag }}"
          fi

          if [[ "${publish}" == "true" ]]; then
            if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "release_tag must look like v0.3.7 when publishing" >&2
              exit 1
            fi
          fi

          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build-linux:
    name: Linux ${{ matrix.platform.release_for }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - release_for: x86_64-musl
            target: x86_64-unknown-linux-musl
            packages: [ agent, server ]
          - release_for: x86_64-gnu
            target: x86_64-unknown-linux-gnu
            packages: [ agent, server ]
          - release_for: aarch64-musl
            target: aarch64-unknown-linux-musl
            packages: [ agent, server ]
          - release_for: aarch64-gnu
            target: aarch64-unknown-linux-gnu
            packages: [ agent, server ]
          - release_for: armv7-musleabihf
            target: armv7-unknown-linux-musleabihf
            packages: [ agent ]
          - release_for: armv7-gnueabihf
            target: armv7-unknown-linux-gnueabihf
            packages: [ agent ]
          - release_for: arm-musleabihf
            target: arm-unknown-linux-musleabihf
            packages: [ agent ]
          - release_for: i686-musl
            target: i686-unknown-linux-musl
            packages: [ agent ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-shared-key: release-linux-${{ matrix.platform.target }}

      - name: Install cross
        env:
          CROSS_VERSION: v0.2.5
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "${HOME}/.local/bin"
          gh release download "${CROSS_VERSION}" \
            --repo cross-rs/cross \
            --pattern cross-x86_64-unknown-linux-gnu.tar.gz \
            -O - \
            | tar -xz -C "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Build selected packages
        env:
          TARGET: ${{ matrix.platform.target }}
          BUILD_AGENT: ${{ contains(matrix.platform.packages, 'agent') }}
          BUILD_SERVER: ${{ contains(matrix.platform.packages, 'server') }}
        run: |
          if [ "${BUILD_AGENT}" = "true" ]; then
            cross build --package nodeget-agent --target "${TARGET}" --profile minimal --locked
          fi
          if [ "${BUILD_SERVER}" = "true" ]; then
            cross build --package nodeget-server --target "${TARGET}" --profile minimal --locked
          fi

      - name: Stage artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.platform.target }}
          SUFFIX: linux-${{ matrix.platform.release_for }}
          BUILD_AGENT: ${{ contains(matrix.platform.packages, 'agent') }}
          BUILD_SERVER: ${{ contains(matrix.platform.packages, 'server') }}
        run: |
          mkdir -p dist
          if [ "${BUILD_AGENT}" = "true" ]; then
            cp "target/${TARGET}/minimal/nodeget-agent" "dist/nodeget-agent-${SUFFIX}"
          fi
          if [ "${BUILD_SERVER}" = "true" ]; then
            cp "target/${TARGET}/minimal/nodeget-server" "dist/nodeget-server-${SUFFIX}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-${{ matrix.platform.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Windows ${{ matrix.platform.release_for }}
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - release_for: x86_64
            target: x86_64-pc-windows-msvc
            packages: [ agent, server ]
          - release_for: aarch64
            target: aarch64-pc-windows-msvc
            packages: [ agent ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.platform.target }}
          cache-shared-key: release-windows-${{ matrix.platform.target }}

      - name: Build selected packages
        run: |
          $target = "${{ matrix.platform.target }}"
          $buildAgent = "${{ contains(matrix.platform.packages, 'agent') }}" -eq "true"
          $buildServer = "${{ contains(matrix.platform.packages, 'server') }}" -eq "true"
          if ($buildAgent) {
            cargo build --package nodeget-agent --target $target --profile minimal --locked
          }
          if ($buildServer) {
            cargo build --package nodeget-server --target $target --profile minimal --locked
          }

      - name: Stage artifacts
        shell: pwsh
        run: |
          $target = "${{ matrix.platform.target }}"
          $suffix = "windows-${{ matrix.platform.release_for }}.exe"
          $buildAgent = "${{ contains(matrix.platform.packages, 'agent') }}" -eq "true"
          $buildServer = "${{ contains(matrix.platform.packages, 'server') }}" -eq "true"
          New-Item -ItemType Directory -Force -Path dist
          if ($buildAgent) {
            Copy-Item "target\$target\minimal\nodeget-agent.exe" "dist\nodeget-agent-$suffix"
          }
          if ($buildServer) {
            Copy-Item "target\$target\minimal\nodeget-server.exe" "dist\nodeget-server-$suffix"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-${{ matrix.platform.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: macOS ${{ matrix.platform.release_for }}
    needs: prepare
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - release_for: aarch64
            target: aarch64-apple-darwin
            packages: [ agent, server ]
          - release_for: x86_64
            target: x86_64-apple-darwin
            packages: [ agent ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.platform.target }}
          cache-shared-key: release-macos-${{ matrix.platform.target }}

      - name: Build selected packages
        env:
          TARGET: ${{ matrix.platform.target }}
          BUILD_AGENT: ${{ contains(matrix.platform.packages, 'agent') }}
          BUILD_SERVER: ${{ contains(matrix.platform.packages, 'server') }}
        run: |
          if [ "${BUILD_AGENT}" = "true" ]; then
            cargo build --package nodeget-agent --target "${TARGET}" --profile minimal --locked
          fi
          if [ "${BUILD_SERVER}" = "true" ]; then
            cargo build --package nodeget-server --target "${TARGET}" --profile minimal --locked
          fi

      - name: Stage artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.platform.target }}
          SUFFIX: macos-${{ matrix.platform.release_for }}
          BUILD_AGENT: ${{ contains(matrix.platform.packages, 'agent') }}
          BUILD_SERVER: ${{ contains(matrix.platform.packages, 'server') }}
        run: |
          mkdir -p dist
          if [ "${BUILD_AGENT}" = "true" ]; then
            cp "target/${TARGET}/minimal/nodeget-agent" "dist/nodeget-agent-${SUFFIX}"
          fi
          if [ "${BUILD_SERVER}" = "true" ]; then
            cp "target/${TARGET}/minimal/nodeget-server" "dist/nodeget-server-${SUFFIX}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-${{ matrix.platform.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build-linux
      - build-windows
      - build-macos
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: NodeGet ${{ needs.prepare.outputs.tag }}
          make_latest: true
          files: dist/*

  publish-docker:
    name: Publish Docker image
    needs:
      - prepare
      - publish-release
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write
    env:
      REGISTRY: docker.io
      IMAGE_NAME: genshinmc/nodeget
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Docker Hub credentials
        shell: bash
        run: |
          test -n "${DOCKERHUB_USERNAME}"
          test -n "${DOCKERHUB_TOKEN}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runtime-release
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NODEGET_VERSION=${{ needs.prepare.outputs.tag }}
            NODEGET_RELEASE_REPO=${{ github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
