name: nodeget-postgres

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nodeget
      POSTGRES_USER: nodeget
      POSTGRES_PASSWORD: nodeget
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nodeget -d nodeget" ]
      interval: 5s
      timeout: 5s
      retries: 20

  nodeget:
    image: genshinmc/nodeget:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODEGET_DATABASE_URL: postgres://nodeget:nodeget@postgres:5432/nodeget
    ports:
      - "2211:2211"
    volumes:
      - ./data/nodeget:/nodeget
